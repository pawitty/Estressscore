<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Election Stress Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Election Stress Monitor</h1>

  <!-- SCORE DISPLAY -->
  <div class="score-card">
    <h2>Stress Score</h2>
    <div id="scoreValue">0.00</div>
    <div id="status">NORMAL</div>
  </div>

  <!-- INPUT SLIDERS -->
  <div class="inputs">
    <label>Air Quality <input type="range" min="0" max="1" step="0.01" id="aq"></label>
    <label>Temperature <input type="range" min="0" max="1" step="0.01" id="temp"></label>
    <label>Humidity <input type="range" min="0" max="1" step="0.01" id="humidity"></label>
    <label>Sound Level <input type="range" min="0" max="1" step="0.01" id="sound"></label>
    <label>Consensus <input type="range" min="0" max="1" step="0.01" id="consensus"></label>
  </div>

  <!-- RESOURCE PANEL -->
  <div class="resources">
    <h2>Recommended Action</h2>
    <p id="actionText">All good. No action needed.</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
